name: Publish to npm

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write          # required for OIDC trusted publishing (+ auto provenance)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm (OIDC needs >= 11.5.1)
        run: npm install -g npm@latest

      - run: npm ci
      - run: npm test

      - name: Check whether this version is already on npm
        id: check
        run: |
          VER="$(node -p "require('./package.json').version")"
          if npm view "node-red-contrib-datetime-format@$VER" version >/dev/null 2>&1; then
            echo "Version $VER already published — skipping publish."
            echo "publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "Version $VER not yet published — will publish."
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish (OIDC trusted publishing)
        if: steps.check.outputs.publish == 'true'
        run: npm publish
